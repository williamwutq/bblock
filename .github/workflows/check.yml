name: Check

on:
  push:
    branches: [ main ]
    paths: ["src/**", "examples/**", "tests/**", "Cargo.toml", "Cargo.lock"]
  pull_request:
    branches: [ main ]
    paths: ["src/**", "examples/**", "tests/**", "Cargo.toml", "Cargo.lock"]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        components: clippy, rustfmt
    - name: Clippy
      run: cargo clippy -- -D warnings
    - name: Format
      run: cargo fmt --check